<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전략적 연금 인출 엔진 v1.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #F3F4F6; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex items-center gap-3 mb-8 bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
            <div class="bg-indigo-600 p-2 rounded-xl text-white shadow-lg">🛡️</div>
            <div>
                <h1 class="text-xl font-black text-gray-900 tracking-tight">전략적 연금 인출 엔진</h1>
                <p class="text-[10px] font-bold text-indigo-500 uppercase">Strategic Pension Withdrawal Engine v1.5</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <section class="bg-white p-6 rounded-3xl border border-gray-200 shadow-sm space-y-5">
                    <h2 class="font-bold text-gray-800 flex items-center gap-2 border-b pb-4">💰 자산 축적 설정</h2>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="text-[10px] font-bold text-gray-400">현재 나이</label><input id="age" type="number" value="35" class="w-full p-2.5 bg-gray-50 border rounded-xl font-bold"></div>
                        <div><label class="text-[10px] font-bold text-gray-400">은퇴 나이</label><input id="retire" type="number" value="60" class="w-full p-2.5 bg-gray-50 border rounded-xl font-bold"></div>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400">현재 잔액 (원)</label>
                        <input id="balanceDisp" type="text" value="50,000,000" oninput="formatInput(this, 'balance')" class="w-full p-2.5 bg-gray-50 border rounded-xl font-bold text-indigo-600">
                        <input id="balance" type="hidden" value="50000000">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400">매월 추가 납입 (원)</label>
                        <input id="monthlyDisp" type="text" value="1,000,000" oninput="formatInput(this, 'monthly')" class="w-full p-2.5 bg-gray-50 border rounded-xl font-bold">
                        <input id="monthly" type="hidden" value="1000000">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400">축적기 기대 수익률</label>
                        <select id="accReturn" class="w-full p-2.5 bg-gray-50 border rounded-xl font-bold">
                            <option value="0.03">안정형 (3%)</option>
                            <option value="0.05" selected>중립형 (5%)</option>
                            <option value="0.08">성장형 (8%)</option>
                        </select>
                    </div>
                </section>

                <section class="bg-white p-6 rounded-3xl border border-gray-200 shadow-sm space-y-5">
                    <h2 class="font-bold text-gray-800 flex items-center gap-2 border-b pb-4">📈 인출 및 운용 전략</h2>
                    <div><label class="text-[10px] font-bold text-gray-400">수령 개시 연령</label><input id="drawAge" type="number" value="65" class="w-full p-2.5 bg-gray-50 border rounded-xl font-bold text-emerald-600"></div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400">수령 방식 선택</label>
                        <select id="drawMethod" onchange="toggleMethodInputs()" class="w-full p-2.5 bg-gray-50 border rounded-xl font-bold">
                            <option value="duration">기간형 (수령 기간 지정)</option>
                            <option value="fixed">정액형 (월 인출금 지정)</option>
                        </select>
                    </div>
                    <div id="methodDuration" class="p-4 bg-indigo-50 rounded-2xl border border-indigo-100">
                        <label class="text-[10px] font-bold text-indigo-400">수령 희망 기간 (년)</label>
                        <input id="drawYears" type="number" value="20" class="w-full p-2 bg-white border border-indigo-200 rounded-lg font-bold">
                    </div>
                    <div id="methodFixed" class="hidden p-4 bg-emerald-50 rounded-2xl border border-emerald-100">
                        <label class="text-[10px] font-bold text-emerald-400">월 인출 희망 금액 (원)</label>
                        <input id="fixedMonthlyDisp" type="text" value="3,000,000" oninput="formatInput(this, 'fixedMonthly')" class="w-full p-2 bg-white border border-emerald-200 rounded-lg font-bold">
                        <input id="fixedMonthly" type="hidden" value="3000000">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400">수령기 기대 수익률</label>
                        <select id="drawReturn" class="w-full p-2.5 bg-gray-50 border rounded-xl font-bold">
                            <option value="0.03" selected>안정형 (3%)</option>
                            <option value="0.045">중립형 (4.5%)</option>
                            <option value="0.06">성장형 (6%)</option>
                        </select>
                    </div>
                </section>

                <button onclick="runSimulation()" class="w-full bg-indigo-600 text-white p-5 rounded-3xl font-black hover:bg-indigo-700 transition-all shadow-xl active:scale-95">
                    🚀 AI 시뮬레이션 시작
                </button>
            </div>

            <div class="lg:col-span-8 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-white p-6 rounded-3xl border border-gray-200 shadow-sm"><p class="text-[10px] font-bold text-gray-400 mb-1">은퇴 시점 총 자산</p><p id="resBalance" class="text-3xl font-black text-indigo-600">- 원</p></div>
                    <div class="bg-white p-6 rounded-3xl border border-gray-200 shadow-sm"><p class="text-[10px] font-bold text-gray-400 mb-1">첫 해 월 수령액</p><p id="resMonthly" class="text-3xl font-black text-emerald-600">- 원</p></div>
                </div>
                
                <div class="bg-white p-8 rounded-3xl border border-gray-200 shadow-sm h-[350px]">
                    <canvas id="pensionChart"></canvas>
                </div>

                <div class="bg-white p-6 rounded-3xl border border-gray-200 shadow-sm overflow-hidden">
                    <h3 class="font-bold text-gray-800 mb-4 px-2">📅 연령별 예상 월 수령액</h3>
                    <div id="ageList" class="grid grid-cols-2 sm:grid-cols-4 gap-3 text-center">
                        <p class="col-span-full text-xs text-gray-400 py-4 italic">시뮬레이션을 시작하면 연령별 수령액이 표시됩니다.</p>
                    </div>
                </div>

                <div id="aiInsight" class="bg-indigo-900 p-8 rounded-3xl text-white shadow-2xl opacity-0 transition-opacity duration-700">
                    <h3 class="text-xl font-black mb-4 flex items-center gap-2">✨ AI 전략 리포트</h3>
                    <div id="insightContent" class="text-sm leading-relaxed text-indigo-100 whitespace-pre-wrap font-medium"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";
        const API_KEY = "AIzaSyBESJ33rtrjwMmCVtID2Toja-_uEQjzShU";
        const genAI = new GoogleGenerativeAI(API_KEY);
        let myChart;

        window.formatInput = (el, hiddenId) => {
            let val = el.value.replace(/[^0-9]/g, '');
            if (val) {
                document.getElementById(hiddenId).value = val;
                el.value = Number(val).toLocaleString();
            }
        };

        window.toggleMethodInputs = () => {
            const method = document.getElementById('drawMethod').value;
            document.getElementById('methodDuration').classList.toggle('hidden', method !== 'duration');
            document.getElementById('methodFixed').classList.toggle('hidden', method !== 'fixed');
        };

        window.runSimulation = async () => {
            const inputs = {
                age: Number(document.getElementById('age').value),
                retire: Number(document.getElementById('retire').value),
                balance: Number(document.getElementById('balance').value),
                monthly: Number(document.getElementById('monthly').value),
                accReturn: Number(document.getElementById('accReturn').value),
                drawAge: Number(document.getElementById('drawAge').value),
                drawReturn: Number(document.getElementById('drawReturn').value),
                drawMethod: document.getElementById('drawMethod').value,
                drawYears: Number(document.getElementById('drawYears').value),
                fixedMonthly: Number(document.getElementById('fixedMonthly').value)
            };

            let current = inputs.balance;
            let data = [];
            let retirementBalance = 0;
            let withdrawalLog = [];

            for(let a = inputs.age; a <= 95; a++) {
                let withdrawal = 0;
                if(a < inputs.retire) {
                    current = (current + (inputs.monthly * 12)) * (1 + inputs.accReturn);
                } else if (a >= inputs.retire && a < inputs.drawAge) {
                    current = current * (1 + inputs.drawReturn);
                    if(a === inputs.retire) retirementBalance = current;
                } else {
                    if(a === inputs.retire) retirementBalance = current;
                    if(inputs.drawMethod === 'duration') {
                        let remainingYears = Math.max(1, inputs.drawYears - (a - inputs.drawAge));
                        withdrawal = current / remainingYears;
                    } else {
                        withdrawal = inputs.fixedMonthly * 12;
                    }
                    current = Math.max(0, (current - withdrawal) * (1 + inputs.drawReturn));
                    if (withdrawal > 0) withdrawalLog.push({age: a, amt: withdrawal/12});
                }
                data.push({age: a, balance: current});
            }

            document.getElementById('resBalance').innerText = Math.round(retirementBalance / 10000).toLocaleString() + "만원";
            document.getElementById('resMonthly').innerText = withdrawalLog.length > 0 ? Math.round(withdrawalLog[0].amt / 10000).toLocaleString() + "만원" : "0원";
            
            updateChart(data);
            updateAgeList(withdrawalLog);
            fetchAIInsight(inputs, retirementBalance, withdrawalLog[0]?.amt * 12 || 0);
        };

        function updateAgeList(logs) {
            const list = document.getElementById('ageList');
            list.innerHTML = logs.filter((_, i) => i % 5 === 0).map(l => `
                <div class="bg-gray-50 p-3 rounded-2xl border border-gray-100">
                    <p class="text-[10px] font-bold text-gray-400">${l.age}세</p>
                    <p class="text-sm font-black text-gray-800">${Math.round(l.amt/10000).toLocaleString()}만원</p>
                </div>
            `).join('');
        }

        function updateChart(data) {
            const ctx = document.getElementById('pensionChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(d => d.age + "세"),
                    datasets: [{ label: '자산 잔액', data: data.map(d => d.balance), borderColor: '#4F46E5', borderWidth: 4, fill: true, backgroundColor: 'rgba(79, 70, 229, 0.05)', tension: 0.4, pointRadius: 0 }]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { ticks: { callback: v => (v/100000000).toFixed(1) + '억' } } } }
            });
        }

        async function fetchAIInsight(i, b, w) {
            const box = document.getElementById('aiInsight');
            box.style.opacity = 1;
            document.getElementById('insightContent').innerText = "전략 분석 중...";
            try {
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                const prompt = `은퇴자산 ${b}원, 월 수령액 ${w/12}원을 계획하는 사용자에게 연금수령한도(120% 룰)와 세금 최적화 팁을 한국어로 3줄 요약해줘.`;
                const result = await model.generateContent(prompt);
                document.getElementById('insightContent').innerText = result.response.text();
            } catch (e) {
                document.getElementById('insightContent').innerText = "연간 1,500만원 이하 수령 시 분리과세 혜택이 큽니다. 인출 시점을 조절하세요.";
            }
        }
    </script>
</body>
</html>
