<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전략적 연금 인출 엔진 v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #F3F4F6; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .table-container { max-height: 450px; overflow-y: auto; }
    </style>
</head>
<body class="p-4 md:p-8 text-[13px]">
    <div class="max-w-7xl mx-auto">
        <header class="flex items-center gap-3 mb-8 bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
            <div class="bg-indigo-600 p-2 rounded-xl text-white shadow-lg font-black text-lg">🛡️</div>
            <div>
                <h1 class="text-xl font-black text-gray-900 tracking-tight">전략적 연금 인출 엔진</h1>
                <p class="text-[10px] font-bold text-indigo-500 uppercase">Strategic Pension Withdrawal Engine v2.0</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <section class="bg-white p-6 rounded-3xl border border-gray-200 shadow-sm space-y-5">
                    <h2 class="font-bold text-gray-800 flex items-center gap-2 border-b pb-4">💰 자산 축적 설정</h2>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="text-[10px] font-bold text-gray-400">현재 나이</label><input id="age" type="number" value="42" class="w-full p-2.5 bg-gray-50 border rounded-xl font-bold"></div>
                        <div><label class="text-[10px] font-bold text-gray-400">은퇴 나이</label><input id="retire" type="number" value="55" class="w-full p-2.5 bg-gray-50 border rounded-xl font-bold"></div>
                    </div>
                    <div><label class="text-[10px] font-bold text-gray-400">현재 잔액 (원)</label><input id="balanceDisp" type="text" value="100,000,000" oninput="formatInput(this, 'balance')" class="w-full p-2.5 bg-gray-50 border rounded-xl font-bold text-indigo-600"><input id="balance" type="hidden" value="100000000"></div>
                    <div><label class="text-[10px] font-bold text-gray-400">매월 추가 납입 (원)</label><input id="monthlyDisp" type="text" value="0" oninput="formatInput(this, 'monthly')" class="w-full p-2.5 bg-gray-50 border rounded-xl font-bold"><input id="monthly" type="hidden" value="0"></div>
                    <div><label class="text-[10px] font-bold text-gray-400">매년 추가 납입 (원)</label><input id="yearlyDisp" type="text" value="8,000,000" oninput="formatInput(this, 'yearly')" class="w-full p-2.5 bg-gray-50 border rounded-xl font-bold"><input id="yearly" type="hidden" value="8000000"></div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400">축적기 기대 수익률</label>
                        <select id="accReturn" class="w-full p-2.5 bg-gray-50 border rounded-xl font-bold">
                            <option value="0.03">안정형 (3%)</option><option value="0.045">중립형 (4.5%)</option><option value="0.06" selected>성장형 (6%)</option>
                        </select>
                    </div>
                </section>

                <section class="bg-white p-6 rounded-3xl border border-gray-200 shadow-sm space-y-5">
                    <h2 class="font-bold text-gray-800 flex items-center gap-2 border-b pb-4">📈 인출 및 운용 전략</h2>
                    <div><label class="text-[10px] font-bold text-gray-400 font-black text-emerald-600">수령 개시 연령</label><input id="drawAge" type="number" value="65" class="w-full p-2.5 bg-gray-50 border rounded-xl font-bold"></div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400">수령 방식 선택</label>
                        <select id="drawMethod" onchange="toggleMethodInputs()" class="w-full p-2.5 bg-gray-50 border rounded-xl font-bold">
                            <option value="duration">기간형 (수령 기간 지정)</option><option value="fixed" selected>정액형 (월 인출금 지정)</option>
                        </select>
                    </div>
                    <div id="methodDuration" class="hidden p-4 bg-indigo-50 rounded-2xl border border-indigo-100"><label class="text-[10px] font-bold text-indigo-400">수령 희망 기간 (년)</label><input id="drawYears" type="number" value="20" class="w-full p-2 bg-white border border-indigo-200 rounded-lg font-bold"></div>
                    <div id="methodFixed" class="p-4 bg-emerald-50 rounded-2xl border border-emerald-100"><label class="text-[10px] font-bold text-emerald-400">월 인출 희망 금액 (원)</label><input id="fixedMonthlyDisp" type="text" value="3,000,000" oninput="formatInput(this, 'fixedMonthly')" class="w-full p-2 bg-white border border-emerald-200 rounded-lg font-bold"><input id="fixedMonthly" type="hidden" value="3000000"></div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400">수령기 기대 수익률</label>
                        <select id="drawReturn" class="w-full p-2.5 bg-gray-50 border rounded-xl font-bold text-emerald-600">
                            <option value="0.03">안정형 (3%)</option><option value="0.045" selected>중립형 (4.5%)</option><option value="0.06">성장형 (6%)</option>
                        </select>
                    </div>
                </section>
            </div>

            <div class="lg:col-span-8 space-y-6">
                <button onclick="runSimulation()" class="w-full bg-indigo-600 text-white p-5 rounded-3xl font-black hover:bg-indigo-700 transition-all shadow-xl active:scale-95 text-lg">
                    🚀 AI 시뮬레이션 시작 (세법 정밀 분석)
                </button>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-center">
                    <div class="bg-white p-6 rounded-3xl border border-gray-200 shadow-sm"><p class="text-[10px] font-bold text-gray-400 mb-1">은퇴 시점 자산</p><p id="resBalance" class="text-xl font-black text-gray-400">- 만원</p></div>
                    <div class="bg-indigo-50 p-6 rounded-3xl border border-indigo-100 shadow-sm"><p class="text-[10px] font-bold text-indigo-400 mb-1 font-black">수령 직전 자산 (거치 수익)</p><p id="resReady" class="text-xl font-black text-indigo-600">- 만원</p></div>
                    <div class="bg-white p-6 rounded-3xl border border-gray-200 shadow-sm"><p class="text-[10px] font-bold text-gray-400 mb-1">첫 해 실수령액(월)</p><p id="resMonthly" class="text-xl font-black text-emerald-600">- 만원</p></div>
                </div>
                
                <div class="bg-white p-8 rounded-3xl border border-gray-200 shadow-sm h-[300px]"><canvas id="pensionChart"></canvas></div>

                <div id="aiInsight" class="bg-indigo-900 p-8 rounded-3xl text-white shadow-2xl opacity-0 transition-all duration-1000">
                    <h3 class="text-lg font-black mb-4 flex items-center gap-2">✨ AI 정밀 절세 리포트</h3>
                    <div id="insightContent" class="text-sm leading-relaxed text-indigo-100 whitespace-pre-wrap font-medium"></div>
                </div>

                <div class="bg-white rounded-3xl border border-gray-200 shadow-sm overflow-hidden text-xs">
                    <h3 class="font-bold text-gray-800 p-6 border-b bg-gray-50/50 flex justify-between items-center">📅 연령별 수령 상세 (연도별 차등 세율 적용)</h3>
                    <div class="table-container">
                        <table class="w-full text-left">
                            <thead class="bg-gray-100 text-[10px] font-black uppercase text-gray-500 sticky top-0 z-10">
                                <tr><th class="px-6 py-4">나이</th><th class="px-6 py-4">수령액(세전)</th><th class="px-6 py-4">세율(연령반영)</th><th class="px-6 py-4">실수령액(월)</th><th class="px-6 py-4 text-right">기말 잔액</th></tr>
                            </thead>
                            <tbody id="pensionTableBody" class="divide-y divide-gray-50">
                                <tr><td colspan="5" class="px-6 py-20 text-center text-gray-400 italic">버튼을 눌러 분석을 시작하세요.</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";
        const API_KEY = "AIzaSyBESJ33rtrjwMmCVtID2Toja-_uEQjzShU";
        const genAI = new GoogleGenerativeAI(API_KEY);
        let myChart;

        window.formatInput = (el, hiddenId) => {
            let val = el.value.replace(/[^0-9]/g, '');
            if (val) { document.getElementById(hiddenId).value = val; el.value = Number(val).toLocaleString(); }
        };

        window.toggleMethodInputs = () => {
            const method = document.getElementById('drawMethod').value;
            document.getElementById('methodDuration').classList.toggle('hidden', method !== 'duration');
            document.getElementById('methodFixed').classList.toggle('hidden', method !== 'fixed');
        };

        // 🔴 연령별/금액별 세율 계산기 함수 (요라님 요청 반영)
        function getTaxRate(age, annualAmount) {
            // 연간 1,500만원 초과 시 일괄 분리과세 16.5% (종합과세 미선택 가정)
            if (annualAmount > 15000000) return 0.165;
            
            // 1,500만원 이하일 경우 연령별 차등 저율과세
            if (age < 70) return 0.055;
            if (age < 80) return 0.044;
            return 0.033;
        }

        window.runSimulation = async () => {
            const i = {
                age: Number(document.getElementById('age').value), retire: Number(document.getElementById('retire').value),
                balance: Number(document.getElementById('balance').value), monthly: Number(document.getElementById('monthly').value),
                yearly: Number(document.getElementById('yearly').value), accReturn: Number(document.getElementById('accReturn').value),
                drawAge: Number(document.getElementById('drawAge').value), drawReturn: Number(document.getElementById('drawReturn').value),
                drawMethod: document.getElementById('drawMethod').value, drawYears: Number(document.getElementById('drawYears').value), fixedMonthly: Number(document.getElementById('fixedMonthly').value)
            };

            let current = i.balance; let chartData = []; let retireBal = 0; let readyBal = 0; let tableRows = [];

            for(let a = i.age; a <= 95; a++) {
                let withdrawalPre = 0;
                if(a < i.retire) {
                    current = (current + (i.monthly * 12) + i.yearly) * (1 + i.accReturn);
                    if(a === i.retire - 1) retireBal = current;
                } else if (a >= i.retire && a < i.drawAge) {
                    current = current * (1 + i.drawReturn);
                    if(a === i.drawAge - 1) readyBal = current;
                } else {
                    if(a === i.retire) retireBal = current;
                    withdrawalPre = i.drawMethod === 'duration' ? current / Math.max(1, i.drawYears - (a - i.drawAge)) : i.fixedMonthly * 12;
                    
                    if (current > 0) {
                        // 🔴 나이별 세율 적용 로직 호출
                        let taxRate = getTaxRate(a, withdrawalPre);
                        let tax = withdrawalPre * taxRate;
                        
                        tableRows.push({ 
                            age: a, pre: withdrawalPre/12, rate: (taxRate * 100).toFixed(1),
                            tax: tax/12, post: (withdrawalPre-tax)/12, balance: Math.max(0, current - withdrawalPre) 
                        });
                        current = Math.max(0, (current - withdrawalPre) * (1 + i.drawReturn));
                    }
                }
                chartData.push({ age: a, balance: current });
            }

            document.getElementById('resBalance').innerText = Math.round(retireBal / 10000).toLocaleString() + "만원";
            document.getElementById('resReady').innerText = Math.round(readyBal / 10000).toLocaleString() + "만원";
            document.getElementById('resMonthly').innerText = tableRows.length > 0 ? Math.round(tableRows[0].post / 10000).toLocaleString() + "만원" : "0원";
            
            updateChart(chartData); updateTable(tableRows);
            fetchAIInsight(i, retireBal, readyBal, tableRows[0]?.pre*12 || 0);
        };

        function updateTable(rows) {
            document.getElementById('pensionTableBody').innerHTML = rows.map(r => `
                <tr class="hover:bg-indigo-50/50">
                    <td class="px-6 py-4 font-bold text-gray-900">${r.age}세</td>
                    <td class="px-6 py-4 text-gray-500">${Math.round(r.pre/10000).toLocaleString()}만</td>
                    <td class="px-6 py-4 ${r.rate > 10 ? 'text-red-500 font-black' : 'text-indigo-500 font-bold'}">
                        ${r.rate}% <span class="text-[9px] opacity-70">(${Math.round(r.tax/10000).toLocaleString()}만)</span>
                    </td>
                    <td class="px-6 py-4 font-black text-emerald-600">${Math.round(r.post/10000).toLocaleString()}만원</td>
                    <td class="px-6 py-4 text-right font-mono font-bold text-gray-400">${(r.balance/100000000).toFixed(1)}억</td>
                </tr>
            `).join('');
        }

        function updateChart(data) {
            const ctx = document.getElementById('pensionChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, { type: 'line', data: { labels: data.map(d => d.age + "세"), datasets: [{ label: '자산 잔액', data: data.map(d => d.balance), borderColor: '#4F46E5', borderWidth: 3, fill: true, backgroundColor: 'rgba(79, 70, 229, 0.05)', tension: 0.4, pointRadius: 0 }] }, options: { responsive: true, maintainAspectRatio: false } });
        }

        async function fetchAIInsight(i, b, rb, annualPre) {
            const box = document.getElementById('aiInsight'); box.style.opacity = 1;
            const content = document.getElementById('insightContent');
            content.innerText = "연령별 차등 세율 및 1,500만원 룰 기반 정밀 분석 중...";
            
            try {
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                const prompt = `
                연금 데이터: 거치후 자산 ${rb}원, 연간 수령액 ${annualPre}원.
                세법 핵심: 1500만원 초과 시 16.5%, 이하 시 연령별 3.3~5.5%.
                
                PM 관점의 절세 리포트:
                1. 현재 수령액이 1500만원 한도를 지키는지 여부와 그에 따른 예상 세율(5.5% vs 16.5%) 언급.
                2. 70세, 80세 이후 세율이 낮아지는 점(4.4%, 3.3%)을 활용한 인출 전략 추천.
                3. 거치 기간 동안 불어난 자산을 가장 효율적으로 인출하는 한 문장 조언.
                한국어로 4줄 이내 요약.
                `;
                const result = await model.generateContent(prompt);
                content.innerText = result.response.text();
            } catch (e) {
                content.innerText = "연령별 차등 세율(5.5% -> 4.4% -> 3.3%)이 적용되었습니다. 1,500만원 한도를 넘지 않도록 관리하여 저율과세 혜택을 극대화하세요.";
            }
        }
    </script>
</body>
</html>
