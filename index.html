<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전략적 연금 인출 엔진 v2.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #F3F4F6; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .table-container { max-height: 450px; overflow-y: auto; }
    </style>
</head>
<body class="p-4 md:p-8 text-[13px]">
    <div class="max-w-7xl mx-auto">
        <header class="flex items-center gap-3 mb-8 bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
            <div class="bg-indigo-600 p-2 rounded-xl text-white shadow-lg font-black text-lg">🛡️</div>
            <div>
                <h1 class="text-xl font-black text-gray-900 tracking-tight">전략적 연금 인출 엔진</h1>
                <p class="text-[10px] font-bold text-indigo-500 uppercase tracking-widest">Strategic Pension Withdrawal Engine v2.3</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <section class="bg-white p-6 rounded-3xl border border-gray-200 shadow-sm space-y-5">
                    <h2 class="font-bold text-gray-800 flex items-center gap-2 border-b pb-4">💰 자산 축적 설정</h2>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="text-[10px] font-bold text-gray-400">현재 나이</label><input id="age" type="number" value="40" class="w-full p-2.5 bg-gray-50 border rounded-xl font-bold"></div>
                        <div><label class="text-[10px] font-bold text-gray-400">은퇴 나이</label><input id="retire" type="number" value="60" class="w-full p-2.5 bg-gray-50 border rounded-xl font-bold"></div>
                    </div>
                    <div><label class="text-[10px] font-bold text-gray-400">현재 잔액 (원)</label><input id="balanceDisp" type="text" value="100,000,000" oninput="formatInput(this, 'balance')" class="w-full p-2.5 bg-gray-50 border rounded-xl font-bold text-indigo-600"><input id="balance" type="hidden" value="100000000"></div>
                    <div><label class="text-[10px] font-bold text-gray-400">매월 추가 납입 (원)</label><input id="monthlyDisp" type="text" value="300,000" oninput="formatInput(this, 'monthly')" class="w-full p-2.5 bg-gray-50 border rounded-xl font-bold"><input id="monthly" type="hidden" value="300000"></div>
                    <div><label class="text-[10px] font-bold text-gray-400">매년 추가 납입 (원)</label><input id="yearlyDisp" type="text" value="5,000,000" oninput="formatInput(this, 'yearly')" class="w-full p-2.5 bg-gray-50 border rounded-xl font-bold"><input id="yearly" type="hidden" value="5000000"></div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400">축적기 기대 수익률</label>
                        <select id="accReturn" class="w-full p-2.5 bg-gray-50 border rounded-xl font-bold">
                            <option value="0.03">안정형 (3%)</option><option value="0.045" selected>중립형 (4.5%)</option><option value="0.06">성장형 (6%)</option>
                        </select>
                    </div>
                </section>

                <section class="bg-white p-6 rounded-3xl border border-gray-200 shadow-sm space-y-5">
                    <h2 class="font-bold text-gray-800 flex items-center gap-2 border-b pb-4">📈 인출 및 운용 전략</h2>
                    <div><label class="text-[10px] font-bold text-gray-400 font-black text-emerald-600">수령 개시 연령</label><input id="drawAge" type="number" value="60" class="w-full p-2.5 bg-gray-50 border rounded-xl font-bold"></div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400">수령 방식 선택</label>
                        <select id="drawMethod" onchange="toggleMethodInputs()" class="w-full p-2.5 bg-gray-50 border rounded-xl font-bold">
                            <option value="duration">기간형 (수령 기간 지정)</option><option value="fixed" selected>정액형 (월 인출금 지정)</option>
                        </select>
                    </div>
                    <div id="methodDuration" class="hidden p-4 bg-indigo-50 rounded-2xl border border-indigo-100"><label class="text-[10px] font-bold text-indigo-400">수령 희망 기간 (년)</label><input id="drawYears" type="number" value="20" class="w-full p-2 bg-white border border-indigo-200 rounded-lg font-bold"></div>
                    <div id="methodFixed" class="p-4 bg-emerald-50 rounded-2xl border border-emerald-100"><label class="text-[10px] font-bold text-emerald-400">월 인출 희망 금액 (원)</label><input id="fixedMonthlyDisp" type="text" value="1,250,000" oninput="formatInput(this, 'fixedMonthly')" class="w-full p-2 bg-white border border-emerald-200 rounded-lg font-bold"><input id="fixedMonthly" type="hidden" value="1250000"></div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400">수령기 기대 수익률</label>
                        <select id="drawReturn" class="w-full p-2.5 bg-gray-50 border rounded-xl font-bold text-emerald-600">
                            <option value="0.03" selected>안정형 (3%)</option><option value="0.045">중립형 (4.5%)</option><option value="0.06">성장형 (6%)</option>
                        </select>
                    </div>
                </section>
            </div>

            <div class="lg:col-span-8 space-y-6">
                <button onclick="runSimulation()" class="w-full bg-indigo-600 text-white p-5 rounded-3xl font-black hover:bg-indigo-700 transition-all shadow-xl active:scale-95 text-lg">
                    🚀 AI 시뮬레이션 시작 (수식 정밀 검증)
                </button>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-center">
                    <div class="bg-white p-6 rounded-3xl border border-gray-200 shadow-sm"><p class="text-[10px] font-bold text-gray-400 mb-1">은퇴 시점 자산</p><p id="resBalance" class="text-lg font-black text-gray-400">-</p></div>
                    <div class="bg-indigo-50 p-6 rounded-3xl border border-indigo-100 shadow-sm"><p class="text-[10px] font-bold text-indigo-400 mb-1 font-black">수령 직전 자산</p><p id="resReady" class="text-lg font-black text-indigo-600">-</p></div>
                    <div class="bg-white p-6 rounded-3xl border border-gray-200 shadow-sm"><p class="text-[10px] font-bold text-gray-400 mb-1">첫 해 실수령액(월)</p><p id="resMonthly" class="text-lg font-black text-emerald-600">-</p></div>
                </div>
                
                <div class="bg-white p-8 rounded-3xl border border-gray-200 shadow-sm h-[300px]"><canvas id="pensionChart"></canvas></div>

                <div id="aiInsight" class="bg-indigo-900 p-8 rounded-3xl text-white shadow-2xl opacity-0 transition-all duration-1000">
                    <div class="flex justify-between items-start mb-4">
                        <h3 class="text-lg font-black flex items-center gap-2">✨ AI 정밀 절세 리포트</h3>
                        <div id="taxGrade" class="px-4 py-1 rounded-full font-black text-xs uppercase tracking-widest">-</div>
                    </div>
                    <div id="insightContent" class="text-sm leading-relaxed text-indigo-100 whitespace-pre-wrap font-medium mb-6"></div>
                </div>

                <div class="bg-white rounded-3xl border border-gray-200 shadow-sm overflow-hidden text-xs">
                    <h3 class="font-bold text-gray-800 p-6 border-b bg-gray-50/50 flex justify-between items-center">
                        📅 연령별 수령 상세 <span id="maxAgeLabel" class="text-indigo-600 font-black ml-2"></span>
                        <div id="reverseAlert" class="hidden flex items-center gap-1 text-red-500 font-bold bg-red-50 px-3 py-1 rounded-full text-[10px] animate-pulse">
                            ⚠️ 한도 초과로 인한 실수령 역전 주의
                        </div>
                    </h3>
                    <div class="table-container">
                        <table class="w-full text-left">
                            <thead class="bg-gray-100 text-[10px] font-black uppercase text-gray-500 sticky top-0 z-10">
                                <tr><th class="px-6 py-4">나이</th><th class="px-6 py-4">수령액(세전)</th><th class="px-6 py-4">세율(세금)</th><th class="px-6 py-4">실수령액(월)</th><th class="px-6 py-4 text-right">기말 잔액</th></tr>
                            </thead>
                            <tbody id="pensionTableBody" class="divide-y divide-gray-50">
                                <tr><td colspan="5" class="px-6 py-20 text-center text-gray-400 italic">분석 버튼을 눌러주세요.</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";
        const API_KEY = "AIzaSyBESJ33rtrjwMmCVtID2Toja-_uEQjzShU";
        const genAI = new GoogleGenerativeAI(API_KEY);
        let myChart;

        window.formatInput = (el, hiddenId) => {
            let val = el.value.replace(/[^0-9]/g, '');
            if (val) { document.getElementById(hiddenId).value = val; el.value = Number(val).toLocaleString(); }
        };

        window.toggleMethodInputs = () => {
            const method = document.getElementById('drawMethod').value;
            document.getElementById('methodDuration').classList.toggle('hidden', method !== 'duration');
            document.getElementById('methodFixed').classList.toggle('hidden', method !== 'fixed');
        };

        function formatEokCheon(value) {
            if (!value || value < 10000) return "0원";
            const eok = Math.floor(value / 100000000);
            const remaining = value % 100000000;
            const cheon = Math.floor(remaining / 10000);
            let result = "";
            if (eok > 0) result += eok + "억 ";
            if (cheon > 0) result += cheon.toLocaleString() + "만원";
            return result.trim();
        }

        function getTaxRate(age, annualAmount) {
            if (annualAmount > 15000000) return 0.165;
            if (age < 70) return 0.055;
            if (age < 80) return 0.044;
            return 0.033;
        }

        window.runSimulation = async () => {
            const i = {
                age: Number(document.getElementById('age').value),
                retire: Number(document.getElementById('retire').value),
                balance: Number(document.getElementById('balance').value),
                monthly: Number(document.getElementById('monthly').value),
                yearly: Number(document.getElementById('yearly').value),
                accReturn: Number(document.getElementById('accReturn').value),
                drawAge: Number(document.getElementById('drawAge').value),
                drawReturn: Number(document.getElementById('drawReturn').value),
                drawMethod: document.getElementById('drawMethod').value,
                drawYears: Number(document.getElementById('drawYears').value),
                fixedMonthly: Number(document.getElementById('fixedMonthly').value)
            };

            let current = i.balance;
            let chartLabels = [];
            let chartData = [];
            let tableRows = [];
            let retireBal = 0;
            let readyBal = 0;
            let lowTaxCount = 0;
            let totalWithdrawalYears = 0;
            let lastAge = i.drawAge;

            // 1. 축적기
            for (let a = i.age; a < i.retire; a++) {
                chartLabels.push(a + "세");
                chartData.push(Math.round(current));
                current = (current + (i.monthly * 12) + i.yearly) * (1 + i.accReturn);
            }
            retireBal = current;

            // 2. 거치기
            for (let a = i.retire; a < i.drawAge; a++) {
                chartLabels.push(a + "세");
                chartData.push(Math.round(current));
                current = current * (1 + i.drawReturn);
            }
            readyBal = current;

            // 3. 수령기 (핵심 수정: 기말 잔액 수식 및 95세까지 루프)
            for (let a = i.drawAge; a <= 95; a++) {
                chartLabels.push(a + "세");
                chartData.push(Math.round(current));
                
                if (current > 10000) { // 최소 잔액 1만원 이상일 때만 인출
                    totalWithdrawalYears++;
                    lastAge = a;
                    
                    let annualWithdrawPre = (i.drawMethod === 'duration') 
                        ? current / Math.max(1, i.drawYears - (a - i.drawAge)) 
                        : i.fixedMonthly * 12;
                    
                    // 잔액보다 인출금이 많으면 잔액만큼만 인출
                    if (annualWithdrawPre > current) annualWithdrawPre = current;

                    let taxRate = getTaxRate(a, annualWithdrawPre);
                    if (taxRate <= 0.055) lowTaxCount++;
                    let tax = annualWithdrawPre * taxRate;

                    // 🔴 수식 수정: 인출 후 남은 금액에 수익률 적용
                    let remainingAfterWithdraw = Math.max(0, current - annualWithdrawPre);
                    
                    tableRows.push({
                        age: a,
                        pre: annualWithdrawPre / 12,
                        rate: (taxRate * 100).toFixed(1),
                        tax: tax / 12,
                        post: (annualWithdrawPre - tax) / 12,
                        balance: remainingAfterWithdraw
                    });

                    current = remainingAfterWithdraw * (1 + i.drawReturn);
                } else {
                    current = 0; // 자산 고갈
                }
            }

            // 결과 업데이트
            document.getElementById('resBalance').innerText = formatEokCheon(retireBal);
            document.getElementById('resReady').innerText = formatEokCheon(readyBal);
            document.getElementById('resMonthly').innerText = tableRows.length > 0 ? Math.round(tableRows[0].post / 10000).toLocaleString() + "만원" : "0원";
            document.getElementById('maxAgeLabel').innerText = `(~${lastAge}세까지 연금 수령 가능)`;

            const lowTaxRatio = totalWithdrawalYears > 0 ? (lowTaxCount / totalWithdrawalYears) * 100 : 0;
            const gradeEl = document.getElementById('taxGrade');
            let grade = lowTaxRatio >= 75 ? "GOOD" : (lowTaxRatio >= 30 ? "SOSO" : "BAD");
            gradeEl.innerText = grade;
            gradeEl.className = `px-4 py-1 rounded-full font-black text-xs uppercase tracking-widest ${grade === "GOOD" ? "bg-emerald-500 text-white" : (grade === "SOSO" ? "bg-orange-500 text-white" : "bg-red-500 text-white")}`;

            updateChart(chartLabels, chartData);
            updateTable(tableRows);
            fetchAIInsight(i, retireBal, readyBal, tableRows[0]?.pre * 12 || 0, grade, lastAge);
        };

        function updateTable(rows) {
            const body = document.getElementById('pensionTableBody');
            body.innerHTML = rows.map(r => `
                <tr class="hover:bg-indigo-50/50">
                    <td class="px-6 py-4 font-bold text-gray-900">${r.age}세</td>
                    <td class="px-6 py-4 text-gray-500">${Math.round(r.pre/10000).toLocaleString()}만</td>
                    <td class="px-6 py-4 ${r.rate > 10 ? 'text-red-500 font-black' : 'text-indigo-500 font-bold'}">${r.rate}% <span class="text-[9px] opacity-70">(${Math.round(r.tax/10000).toLocaleString()}만)</span></td>
                    <td class="px-6 py-4 font-black text-emerald-600">${Math.round(r.post/10000).toLocaleString()}만원</td>
                    <td class="px-6 py-4 text-right font-mono font-bold text-gray-400">${formatEokCheon(r.balance)}</td>
                </tr>
            `).join('');
        }

        function updateChart(labels, data) {
            const ctx = document.getElementById('pensionChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{ label: '자산 잔액(원)', data: data, borderColor: '#4F46E5', borderWidth: 3, fill: true, backgroundColor: 'rgba(79, 70, 229, 0.05)', tension: 0.4, pointRadius: 0 }]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { ticks: { callback: v => (v/100000000).toFixed(1) + '억' } } } }
            });
        }

        async function fetchAIInsight(i, b, rb, annualPre, grade, lastAge) {
            const box = document.getElementById('aiInsight'); box.style.opacity = 1;
            const content = document.getElementById('insightContent');
            let tipMsg = grade === "GOOD" ? "연령별 차등 세율이 잘 적용되어 저율과세 혜택이 극대화 되어 있습니다." : (grade === "SOSO" ? "연령별 차등 세율이 모두 적용되지 않습니다. 수령 기간을 늘리거나, 월 수령액을 낮춰 주세요." : "개인연금 세제혜택을 받지 못하고 있습니다. 수령 기간을 늘리거나, 월 수령액을 낮춰 주세요.");
            try {
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                const prompt = `등급: ${grade}. 수령가능나이: ${lastAge}세. 수령직전: ${formatEokCheon(rb)}. 연간수령액: ${annualPre}원. PM 관점에서 3줄 분석. 마지막 문구는 반드시 "${tipMsg}" 포함. 또한 국민연금은 별산이라는 점 언급.`;
                const result = await model.generateContent(prompt);
                content.innerText = result.response.text();
            } catch (e) { content.innerText = tipMsg; }
        }

        window.onload = () => runSimulation();
    </script>
</body>
</html>
